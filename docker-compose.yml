services:
  herald-copilot-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8788:8788"
    environment:
      # opcjonalnie: domyślny model i timeout z application.yml można nadpisać
      HERALD_COPILOT_DEFAULTMODEL: "claude-sonnet-4.5"
      HERALD_COPILOT_WORKERTIMEOUTMS: "120000"

      # jeśli jesteś za proxy korpo:
      # HTTP_PROXY: "http://proxy:3128"
      # HTTPS_PROXY: "http://proxy:3128"
    # żeby worker miał gdzie tworzyć temp-dir (zwykle i tak ma)
    tmpfs:
      - /tmp